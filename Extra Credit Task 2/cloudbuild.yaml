substitutions:
  _TAG: latest

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.backend
      - -t
      - us-central1-docker.pkg.dev/aibm-492318/aibm/langflow-backend:${_TAG}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - Dockerfile.frontend
      - -t
      - us-central1-docker.pkg.dev/aibm-492318/aibm/streamlit-frontend:${_TAG}
      - .
images:
  - us-central1-docker.pkg.dev/aibm-492318/aibm/langflow-backend:${_TAG}
  - us-central1-docker.pkg.dev/aibm-492318/aibm/streamlit-frontend:${_TAG}
options:
  machineType: E2_HIGHCPU_8
timeout: 1800s
